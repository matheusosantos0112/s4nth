<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedido Confirmado | SANTH</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/png" href="../img/favicon.png">
</head>
<body>

    <main class="success-page">
        <div class="success-content">
            <div class="success-icon">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <h1>Pedido Confirmado!</h1>
            <p>Obrigado por escolher a SANTH. Seu pedido foi recebido e está sendo processado. Você receberá um e-mail de confirmação em breve.</p>
            <div class="success-order-id" id="orderId"></div>
            <br><br>
            <a href="../index.html" class="btn btn-primary">Voltar à Loja</a>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const orderId = localStorage.getItem('santh_last_order');
            const el = document.getElementById('orderId');
            if (orderId && el) {
                el.textContent = `Pedido: ${orderId}`;
            }
        });
    </script>
</body>
</html>
