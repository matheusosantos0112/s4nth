<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | SANTH</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/png" href="../img/favicon.png">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            padding: 40px 20px;
        }
        .auth-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 48px 40px;
            width: 100%;
            max-width: 460px;
            box-shadow: var(--shadow-lg);
        }
        .auth-card .logo {
            justify-content: center;
            margin-bottom: 32px;
        }
        .auth-card .logo img {
            height: 60px;
        }
        .auth-card h2 {
            font-family: var(--font-display);
            font-size: 1.6rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
        }
        .auth-card .subtitle {
            text-align: center;
            color: var(--gray-500);
            font-size: 0.9rem;
            margin-bottom: 32px;
        }
        .auth-form .form-group {
            margin-bottom: 18px;
        }
        .auth-form label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--gray-700);
        }
        .auth-form label .optional {
            font-weight: 400;
            color: var(--gray-400);
            font-size: 0.8rem;
        }
        .auth-form input {
            width: 100%;
            padding: 14px 18px;
            border: 1.5px solid var(--gray-200);
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            font-family: var(--font-main);
            transition: var(--transition);
            background: var(--white);
            outline: none;
        }
        .auth-form input:focus {
            border-color: var(--black);
            box-shadow: 0 0 0 3px var(--accent-light);
        }
        .auth-form .btn {
            width: 100%;
            margin-top: 8px;
        }
        .auth-form .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .auth-error {
            color: #dc2626;
            font-size: 0.85rem;
            text-align: center;
            margin-top: 12px;
            display: none;
        }
        .auth-link {
            text-align: center;
            margin-top: 24px;
            font-size: 0.9rem;
            color: var(--gray-500);
        }
        .auth-link a {
            color: var(--black);
            font-weight: 600;
            text-decoration: none;
        }
        .auth-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <main class="auth-page">
        <div class="auth-card">
            <a href="../index.html" class="logo"><img src="../img/logo.png" alt="SANTH"></a>
            <h2>Crie sua conta</h2>
            <p class="subtitle">Cadastre-se para acompanhar pedidos e receber ofertas</p>
            <form class="auth-form" id="registerForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="regName">Nome *</label>
                        <input type="text" id="regName" placeholder="Seu nome" required>
                    </div>
                    <div class="form-group">
                        <label for="regLastName">Sobrenome *</label>
                        <input type="text" id="regLastName" placeholder="Sobrenome" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="regEmail">E-mail *</label>
                    <input type="email" id="regEmail" placeholder="seu@email.com" required>
                </div>
                <div class="form-group">
                    <label for="regPhone">Telefone *</label>
                    <input type="tel" id="regPhone" placeholder="(00) 00000-0000" maxlength="15" required>
                </div>
                <div class="form-group">
                    <label for="regCpf">CPF <span class="optional">(opcional)</span></label>
                    <input type="text" id="regCpf" placeholder="000.000.000-00" maxlength="14">
                </div>
                <div class="form-group">
                    <label for="regPassword">Senha *</label>
                    <input type="password" id="regPassword" placeholder="Mínimo 6 caracteres" minlength="6" required>
                </div>
                <div class="form-group">
                    <label for="regPasswordConfirm">Confirmar Senha *</label>
                    <input type="password" id="regPasswordConfirm" placeholder="Repita a senha" minlength="6" required>
                </div>
                <button type="submit" class="btn btn-primary">Criar Conta</button>
                <p class="auth-error" id="registerError"></p>
            </form>
            <p class="auth-link">Já tem uma conta? <a href="login-cliente.html">Entrar</a></p>
        </div>
    </main>

    <div class="toast" id="toast"><span class="toast-message" id="toastMessage"></span></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const { data } = await _supabase.auth.getSession();
            if (data.session) {
                window.location.href = 'minha-conta.html';
                return;
            }

            const form = document.getElementById('registerForm');
            const errorEl = document.getElementById('registerError');

            const phoneInput = document.getElementById('regPhone');
            phoneInput.addEventListener('input', () => {
                let v = phoneInput.value.replace(/\D/g, '').slice(0, 11);
                if (v.length > 10) v = v.replace(/(\d{2})(\d{5})(\d{4})/, '($1) $2-$3');
                else if (v.length > 6) v = v.replace(/(\d{2})(\d{4})(\d{0,4})/, '($1) $2-$3');
                else if (v.length > 2) v = v.replace(/(\d{2})(\d{0,5})/, '($1) $2');
                phoneInput.value = v;
            });

            const cpfInput = document.getElementById('regCpf');
            cpfInput.addEventListener('input', () => {
                let v = cpfInput.value.replace(/\D/g, '').slice(0, 11);
                if (v.length > 9) v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/, '$1.$2.$3-$4');
                else if (v.length > 6) v = v.replace(/(\d{3})(\d{3})(\d{1,3})/, '$1.$2.$3');
                else if (v.length > 3) v = v.replace(/(\d{3})(\d{1,3})/, '$1.$2');
                cpfInput.value = v;
            });

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                errorEl.style.display = 'none';

                const name = document.getElementById('regName').value.trim();
                const lastName = document.getElementById('regLastName').value.trim();
                const email = document.getElementById('regEmail').value.trim();
                const phone = document.getElementById('regPhone').value.trim();
                const cpf = document.getElementById('regCpf').value.trim();
                const password = document.getElementById('regPassword').value;
                const passwordConfirm = document.getElementById('regPasswordConfirm').value;

                if (password !== passwordConfirm) {
                    errorEl.textContent = 'As senhas não coincidem.';
                    errorEl.style.display = 'block';
                    return;
                }

                try {
                    const { data, error } = await _supabase.auth.signUp({
                        email: email,
                        password: password,
                        options: {
                            data: {
                                name: name,
                                last_name: lastName,
                                full_name: `${name} ${lastName}`,
                                phone: phone,
                                cpf: cpf
                            }
                        }
                    });

                    if (error) throw error;

                    if (data.user) {
                        const { error: profileError } = await _supabase.from('profiles').insert({
                            id: data.user.id,
                            name: name,
                            last_name: lastName,
                            full_name: `${name} ${lastName}`,
                            email: email,
                            phone: phone,
                            cpf: cpf || null
                        });

                        if (profileError) console.warn('Profile insert error:', profileError);
                    }

                    if (data.user && data.user.identities && data.user.identities.length === 0) {
                        errorEl.textContent = 'Este e-mail já está cadastrado.';
                        errorEl.style.display = 'block';
                        return;
                    }

                    window.location.href = 'minha-conta.html';
                } catch (err) {
                    console.error('Register error:', err);
                    if (err.message && err.message.includes('already registered')) {
                        errorEl.textContent = 'Este e-mail já está cadastrado.';
                    } else if (err.message && err.message.includes('valid email')) {
                        errorEl.textContent = 'E-mail inválido.';
                    } else {
                        errorEl.textContent = 'Erro ao criar conta. Tente novamente.';
                    }
                    errorEl.style.display = 'block';
                }
            });
        });
    </script>
</body>
</html>
